apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    k8s-app: metrics-server
  name: metrics-server
  namespace: kube-system

spec:
  replicas: 1

  selector:
    matchLabels:
      k8s-app: metrics-server

  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
    type: RollingUpdate

  template:
    metadata:
      labels:
        k8s-app: metrics-server

    spec:
      serviceAccountName: metrics-server
      priorityClassName: system-cluster-critical

      nodeSelector:
        kubernetes.io/os: linux

      containers:
      - name: metrics-server

        image: registry.k8s.io/metrics-server/metrics-server:v0.8.1
        imagePullPolicy: IfNotPresent

        args:
        - --cert-dir=/tmp
        - --secure-port=10250
        - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
        - --kubelet-use-node-status-port
        - --metric-resolution=15s
        - --kubelet-insecure-tls

        ports:
        - name: https
          containerPort: 10250
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /livez
            port: https
            scheme: HTTPS

        readinessProbe:
          httpGet:
            path: /readyz
            port: https
            scheme: HTTPS
          initialDelaySeconds: 20

        resources:
          requests:
            cpu: 100m
            memory: 200Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000

        volumeMounts:
        - name: tmp-dir
          mountPath: /tmp

      volumes:
      - name: tmp-dir
        emptyDir: {}
