replicaCount: 1

image:
  repository: payment-api
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

config:
  APP_ENV: development

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: payment-dev.local

secret:
  dbPassword: paymentpass

postgres:
  image: postgres:16
  username: paymentuser
  password: paymentpass
  database: paymentdb
  storage: 2Gi

serviceMonitor:
  enabled: false
