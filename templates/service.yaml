apiVersion: v1
kind: Service

metadata:
  name: {{ include "payment-platform.fullname" . }}
  labels:
    {{- include "payment-platform.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ include "payment-platform.name" . }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
