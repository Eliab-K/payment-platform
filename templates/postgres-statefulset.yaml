apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres

spec:
  serviceName: postgres

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres

        image: {{ .Values.postgres.image }}

        ports:
        - containerPort: 5432

        env:

        - name: POSTGRES_USER
          value: "{{ .Values.postgres.username }}"

        - name: POSTGRES_PASSWORD
          value: "{{ .Values.postgres.password }}"

        - name: POSTGRES_DB
          value: "{{ .Values.postgres.database }}"

        volumeMounts:

        - name: postgres-storage

          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:

  - metadata:
      name: postgres-storage

    spec:

      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: {{ .Values.postgres.storage }}
